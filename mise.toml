[tools]
go = "1.26"
gofumpt = "latest"
golangci-lint = "latest"
golangci-lint-langserver = "latest"
goreleaser = "latest"
golines = "latest"
gum = "latest"
"go:github.com/incu6us/goimports-reviser/v3" = "latest"
"go:golang.org/x/tools/gopls" = "latest"

[tasks.all]
depends = ["build", "format", "lint", "test"]

[tasks.ci]
description = "Run CI checks without modifying files"
depends = ["build", "format-check", "lint-check", "test"]

[tasks.build]
description = "Build the project"
run = "go build"

[tasks.lint]
description = "Lint the code with golangci-lint"
run = "golangci-lint run --fix"

[tasks.lint-check]
description = "Lint the code without applying fixes"
run = "golangci-lint run"

[tasks.format]
description = "Format the code with golangci-lint"
run = "golangci-lint fmt"

[tasks.format-check]
description = "Check code formatting without applying fixes"
run = "golangci-lint fmt --diff"

[tasks.test]
description = "Run Go tests"
run = "go test ./..."
